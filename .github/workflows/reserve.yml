name: Reserve Tennis Court

on:
  schedule:
    # 8:00 AM Uruguay time (UYT = UTC-3) = 11:00 AM UTC
    - cron: "0 11 * * *"
  workflow_dispatch:   # Allows manual trigger from GitHub UI (for testing)

jobs:
  reserve:
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Run reservation script
        env:
          TENNIS_USER: ${{ secrets.TENNIS_USER }}
          TENNIS_PASS: ${{ secrets.TENNIS_PASS }}
        run: python reserve.py

      - name: Upload screenshots (always, for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_id }}
          path: screenshots/
          retention-days: 7
